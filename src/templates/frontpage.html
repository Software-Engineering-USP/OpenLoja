<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop's Frontpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../static/frontpage.css">
    <link rel="stylesheet" href="../static/modal.css">
</head>
<body>

    <header class="shop-header">

        <!-- Main Navigation Bar -->
        <nav class="navbar">
            <!-- Search Bar (Busca em tempo real via JS) -->
            <div class="search-container">
                <input type="text" id="js-search-input" placeholder="Pesquise por nossos produtos...">
                <button type="button"><i class="fas fa-search"></i></button>
            </div>

            <!-- Navigation Links -->
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about-us" class="active">Sobre nós</a></li>
                <li><a href="#catalogo">Catálogo</a></li>
            </ul>

            <!-- Shop Icons / Utilities -->
            <div class="header-actions">
	      
              <button id="open-login" class="login-btn" onclick="pagina_login()">
                <i class="far fa-user"></i>
		{% if usuario %}
		<span> {{ usuario.nome }} </span>
		{% else %}
                <span>Entrar</span>
		{% endif %}
              </button>
	      

              <a href="#wishlist" class="header-action">
                <i class="far fa-heart"></i>
                <span>Favoritos</span>
                <span class="badge">0</span>
              </a>

              <a href="#cart" id="open-cart" class="header-action">
                <i class="fas fa-shopping-cart"></i>
                <span>Carrinho</span>
                <span class="badge">3</span>
              </a>

            </div>

            <div class="logo">
                <a href="#home"><span>Nome da </span>Loja!</a>
            </div>
        </nav>
    </header>

    <main class="frontpage-content">

        <section class="catalog-section">
            <div class="catalog-header">

                <!-- Filtros por Tags/Categorias -->
                <div class="tag-filters">
                    <button class="tag-btn active" data-tag="all">Todos</button>
                    <button class="tag-btn" data-tag="roupas">Tipo 1</button>
                    <button class="tag-btn" data-tag="calcados">Tipo 2</button>
                    <button class="tag-btn" data-tag="acessorios">Tipo 3</button>
                </div>
            </div>

            <!-- Grid de Produtos Dinâmico -->
            <div class="product-grid" id="product-grid">

                {% for produto in produtos %}
                <article class="product-card" data-tags="{{ produto.tag }}">
                    <a href="/product/{{ produto.id }}" class="product-image">
                        <span class="card-badge new-badge">Novo</span>
                        <img src="{{ produto.imagem_url }}" alt="{{ produto.nome }}">
                    </a>
                    <div class="product-info">
                        <a href="/product/{{ produto.id }}" class="product-title-link">
                            <h3 class="product-title">{{ produto.nome }}</h3>
                        </a>
                        <p class="product-category">{{ produto.categoria }}</p>
                        <p class="product-price">R$ {{ produto.preco }}</p>
                        <button class="buy-btn" data-id="{{ produto.id }}">Adicionar ao Carrinho</button>
                    </div>
                </article>
                {% endfor %}

            </div>

            <div id="no-results" class="hidden-message">
                Nenhum produto encontrado para a sua busca.
            </div>
        </section>
    </main>


    

    <!-- ==================== MODAL CARRINHO ==================== -->

    <div id="cart-sidebar-overlay" class="sidebar-overlay">

        <aside id="cart-sidebar" class="cart-sidebar">

            <div class="cart-header">

                <h2>Meu Carrinho</h2>

                <button
                    id="close-cart"
                    aria-label="Fechar carrinho">
                    &times;
                </button>

            </div>

            <div class="cart-items" id="cart-items">

            </div>

            <div class="cart-footer">

                <div class="cart-total">

                    <span>Total</span>

                    <strong id="cart-total">R$ 0,00</strong>

                </div>

                <button class="checkout-btn">

                    Finalizar Compra

                </button>

            </div>

        </aside>

    </div>

    <script src="/static/frontpage.js"></script>
    <script src="/static/modal.js"></script>
    <script>
      const usuarioLogado = {{ "true" if usuario else "false" }}
    </script>
</body>
</html>
