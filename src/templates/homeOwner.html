<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard do Vendedor</title>
    <link rel="stylesheet" href="../static/homeStyle.css">
    <link rel="stylesheet" href="../static/dashboardStyle.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div class="brand-icon">S</div>
                <div class="brand-info">
                    <h1>Dashboard do Vendedor</h1>
                </div>
            </div>
            <nav class="action-buttons">
                <a href="/homeOwner">Home</a>
                <a href="/stock">Estoque</a>
                <a href="/statistics">Estatísticas</a>
                <a href="/orders">Pedidos</a>
                <a href="/settings">Configurações</a>
            </nav>
        </header>

        <div class="dashboard-grid">
            <a class="card card-link" href="/statistics">
                <h2>Receita Mensal</h2>
                <div class="value">XX</div>
            </a>
            <a class="card card-link" href="/stock">
                <h2>Itens em Estoque</h2>
                <div class="value">XX</div>
            </a>
            <a class="card card-link" href="/stock">
                <h2>Valor do Estoque</h2>
                <div class="value">XX</div>
                <small>Valor estimado do estoque</small>
            </a>
        </div>

        <div class="stats-panel">
            <div class="panel">
                <h2>Dashboard Mensal</h2>
                <div class="stat-row">
                    <span>Vendas deste mês</span>
                    <span>XX</span>
                </div>
                <div class="stat-row">
                    <span>Novos clientes</span>
                    <span>XX</span>
                </div>
                <a href="/statistics" class="see-more-link">Ver estatísticas completas</a>
            </div>
        </div>
    </div>
</body>
</html>
